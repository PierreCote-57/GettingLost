name: To WordPress (incr, on push)

# Runs automatically on every push to main. Builds the list of
# changed/removed files with `git diff --name-status` between the
# push's before/after commits — this reads the actual commit history,
# so it works the same whether the push came from the GitHub web
# editor, the command line, or anything else. (The push event's own
# commits[].added/modified/removed fields are NOT used here — they're
# unreliable for commits made via the web editor.)
#
# - Removed files are logged as a warning, never auto-deleted from WP.
# - New page files with no entry in local/config/page-map.json are logged
#   as a warning by sync.js, never auto-created in WP.
# - If anything under local/config/ changes, all pages are synced
#   (IDs/structure may have shifted).
#
# The separate "Sync to WordPress" workflow (manual, workflow_dispatch)
# is unchanged and remains your full-overwrite "force everything" tool.
on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "posts/**"
      - "media/**"
      - "local/config/**"
      - "local/sync/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine changed files
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          EMPTY_SHA="0000000000000000000000000000000000000000"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$EMPTY_SHA" ]; then
            echo "No previous commit on this branch — diffing the commit against its parent (or treating as all-new if it's the root commit)."
            git show --name-status --pretty=format: "$AFTER" > diff.txt
          else
            git diff --name-status "$BEFORE" "$AFTER" > diff.txt
          fi

          echo "Raw diff:"
          cat diff.txt

          # D <path>            -> removed
          # everything else, last column on the line -> changed
          # (covers A/M, and R### old\tnew renames by taking the new path)
          awk '
            $1 ~ /^D/ { print $2 >> "removed-files.txt"; next }
            { print $NF >> "changed-files.txt" }
          ' diff.txt

          touch changed-files.txt removed-files.txt
          echo "Changed files:"; cat changed-files.txt
          echo "Removed files:"; cat removed-files.txt

      - name: Run incremental sync
        working-directory: local/sync
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          FILEBIRD_TOKEN: ${{ secrets.FILEBIRD_TOKEN }}
        run: node sync.js --changed-files=../../changed-files.txt --removed-files=../../removed-files.txt
