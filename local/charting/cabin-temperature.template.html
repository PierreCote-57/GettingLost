<!DOCTYPE html>
<!--
  Cabin temperature chart — LOCKED TEMPLATE (finalized 2026-07-13)

  Render to PNG (no local node; uses headless Chrome + Pillow):
    1. Google Chrome --headless=new --disable-gpu --hide-scrollbars \
         --force-device-scale-factor=2 --window-size=780,540 --virtual-time-budget=4000 \
         --screenshot=out-2x.png file:///abs/path/to/this.html
    2. Pillow: crop top 1560x1040 (drop white bottom margin), resize to 780x520 (LANCZOS).
       -> supersampled, crisp. Copy the 780x520 PNG into logs/ as the deliverable.

  To make a new chart: edit CFG + TIMES + VALS below. Nothing else.
  Canvas is 780x520 (aspect 1.5:1); keep --window-size width = canvas width.
-->
<html>
<head>
<meta charset="utf-8">
<style>body{margin:0;background:#fff;}</style>
</head>
<body>
<canvas id="cA" width="780" height="520"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ===== CONFIG — edit per chart ===== */
const CFG = {
  title:      'Cabin temperature',
  subtitle:   'Picnic at Beavertail Lake · 2026-07-12',
  band:       { lo: 15, hi: 25 },   // fixed y-axis (°C); readings outside clamp to nearest extreme
  thermostat: 21.1                  // black setpoint line (°C); set to null to omit (cabin-only feature)
};

/* ===== DATA — times in decimal hours (0–24), vals in °C =====
   Target source: the CSV logger (one point every 10 min). Parse each row:
   Time "HH:MM" -> decimal hours (h + m/60); Temperature(C) -> vals. */
const TIMES = [7, 8 + 25/60, 9 + 5/60, 10 + 5/60, 12 + 45/60];
const VALS  = [13.6, 19.9, 21.4, 22.6, 25.5];
/* ===== END EDITS ===== */

const INK = '#000000';
const LO = CFG.band.lo, HI = CFG.band.hi, THERMO = CFG.thermostat;
const cl  = v => Math.max(LO, Math.min(HI, v));
const oob = v => v < LO || v > HI;

// Clamp the interpolated LINE (not just points): insert a vertex where the true
// line crosses a band edge, then hold flat at the extreme. Flat-at-edge segments
// render red (see segment.borderColor) so out-of-range is visible without markers.
function clampSeries(xs, vs){
  const pts = [];
  for (let i = 0; i < xs.length; i++){
    if (i > 0){
      const x0=xs[i-1], y0=vs[i-1], x1=xs[i], y1=vs[i], cr=[];
      [LO,HI].forEach(b => { if ((y0<b && y1>b) || (y0>b && y1<b)){ const f=(b-y0)/(y1-y0); cr.push({x:x0+f*(x1-x0), y:b}); } });
      cr.sort((a,b)=>a.x-b.x); cr.forEach(c=>pts.push(c));
    }
    pts.push({ x: xs[i], y: cl(vs[i]) });
  }
  return pts;
}
function fmtClock(h){ h=((h%24)+24)%24; const ap=h<12?'AM':'PM'; let hr=h%12; if(hr===0)hr=12; return hr+' '+ap; }
function niceStep(span){ return [1,2,3,4,6,12,24].find(s => span/s <= 12) || 24; }  // whole-hour ticks, no label overlap

const winMin = Math.floor(TIMES[0]), winMax = Math.ceil(TIMES[TIMES.length-1]);
const step   = niceStep(winMax - winMin);
const line   = clampSeries(TIMES, VALS);

const paint = { id:'paint',
  beforeDraw(ch){ const {ctx,width,height}=ch; ctx.save(); ctx.fillStyle='#fff'; ctx.fillRect(0,0,width,height); ctx.restore(); },
  afterDatasetsDraw(ch){          // thermostat LINE is the dataset below; here we only label it
    if (THERMO == null) return;
    const {ctx}=ch, y=ch.scales.y.getPixelForValue(THERMO), {right}=ch.chartArea;
    ctx.save(); ctx.font='12px sans-serif'; ctx.fillStyle=INK; ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText('Thermostat '+THERMO.toFixed(1)+'°C', right-4, y-3); ctx.restore();
  }
};

new Chart(document.getElementById('cA'), { type:'line',
  data:{ datasets:[
    { data:line, borderColor:'#2a78d6', borderWidth:3, fill:false, tension:0, order:2,
      pointRadius:0, pointHoverRadius:0,
      segment:{ borderColor:c=>{ const a=c.p0.parsed.y,b=c.p1.parsed.y; return ((a===LO&&b===LO)||(a===HI&&b===HI))?'#e34948':'#2a78d6'; } } },
    { data:[{x:winMin,y:THERMO},{x:winMax,y:THERMO}], borderColor:INK, borderWidth:2, pointRadius:0, fill:false, tension:0, order:1, hidden: THERMO==null }
  ]},
  options:{ responsive:false, animation:false, devicePixelRatio:2, layout:{ padding:{ top:16, right:12 } },
    plugins:{
      legend:{ display:false },
      title:{ display:true, text:CFG.title, color:'#000', font:{ size:17, weight:'500' }, padding:{ top:4, bottom:0 } },
      subtitle:{ display:true, text:CFG.subtitle, color:'#6b6b6b', font:{ size:12 }, padding:{ top:2, bottom:12 } },
      tooltip:{ enabled:false }
    },
    scales:{
      y:{ min:LO, max:HI, title:{ display:true, text:'Temperature (°C)', color:'#000', font:{ size:14 } },
          ticks:{ stepSize:1, callback:v=>v+'°', color:'#000', font:{ size:14 } }, grid:{ color:'#e1e0d9' }, border:{ color:'#000' } },
      x:{ type:'linear', min:winMin, max:winMax,
          ticks:{ stepSize:step, autoSkip:false, maxRotation:0, color:'#000', font:{ size:14 },
                  callback:v => ((v-winMin)%step!==0) ? '' : fmtClock(v) }, grid:{ display:true, color:'#e1e0d9' }, border:{ color:'#000' } }
    }
  }, plugins:[paint] });
</script>
</body>
</html>
